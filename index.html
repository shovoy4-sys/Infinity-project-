<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ভিডিও পোর্টাল - টেলিগ্রাম মিনি অ্যাপ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- টেলিগ্রাম ওয়েব অ্যাপ SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- এডসগ্রাম SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: #0a0a0a;
            padding: 1rem;
            color: #ffffff;
            min-height: 100vh;
        }

        /* কমলা + কালো থিম */
        .main-content {
            display: block;
        }

        .loading-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000;
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            z-index: 1002;
            text-align: center;
            font-weight: bold;
            border: 2px solid #ff6a3d;
            box-shadow: 0 10px 30px rgba(255,106,61,0.3);
            animation: fadeIn 0.2s ease;
        }

        .loading-notification i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #ff6a3d;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .slider-section {
            margin-bottom: 2rem;
            background: #111111;
            border-radius: 1.5rem;
            padding: 1rem 0.75rem;
            border: 1px solid #ff6a3d30;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.5);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            border-left: 5px solid #ff6a3d;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
        }

        .section-title i {
            color: #ff6a3d;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 1.2rem;
            background: #1a1a1a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease-in-out;
        }

        .carousel-slide {
            flex: 0 0 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }

        .thumb-video-card {
            background: #0a0a0a;
            border-radius: 1.2rem;
            overflow: hidden;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            border: 1px solid #ff6a3d30;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .thumb-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000000;
            cursor: pointer;
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: all 0.4s ease;
        }

        /* ব্লার ইফেক্ট - ডিফল্টভাবে সব ছবি ব্লার থাকবে */
        .thumb-img.blurred {
            filter: blur(8px);
            transform: scale(1.05);
        }

        /* আনলক হওয়ার পর ব্লার সরানো হবে */
        .thumb-img.unblurred {
            filter: blur(0);
            transform: scale(1);
        }

        /* আনলক ইন্ডিকেটর - লকের উপরে */
        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);
        }

        .lock-overlay i {
            font-size: 2.5rem;
            color: #ff6a3d;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 50%;
        }

        .lock-overlay.hidden {
            display: none;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 10;
        }

        .play-overlay i {
            font-size: 3.5rem;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }

        .play-overlay:hover i {
            transform: scale(1.1);
            color: #ff6a3d;
        }

        .thumb-wrapper:hover .thumb-img {
            transform: scale(1.02);
        }

        .card-info {
            padding: 1rem;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            word-break: break-word;
            line-height: 1.4;
            color: #ffffff;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 0.6rem 0.5rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download {
            background: #1a1a1a;
            color: #ff6a3d;
            border: 1px solid #ff6a3d;
        }

        .btn-download:hover {
            background: #ff6a3d20;
        }

        .btn-watch {
            background: #ff6a3d;
            color: #000000;
            border: none;
            font-weight: bold;
        }

        .btn-watch:hover {
            background: #ff8555;
        }

        .unlock-counter {
            display: inline-block;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-left: 8px;
            letter-spacing: 0.5px;
            color: #ffaa66;
        }

        .btn.locked {
            background: #1a1a1a;
            opacity: 0.8;
        }

        .btn.locked.btn-watch {
            background: #333333;
            color: #888888;
        }

        .btn.locked.btn-download {
            background: #1a1a1a;
            color: #666666;
            border-color: #444444;
        }

        .btn.unlocked {
            background: #ff6a3d;
            opacity: 1;
        }

        .btn.unlocked.btn-download {
            background: #ff6a3d;
            color: #000000;
            border: none;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .dot {
            width: 30px;
            height: 4px;
            background: #333333;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .dot.active {
            background: #ff6a3d;
            width: 40px;
        }

        .thumbnails-grid {
            margin-top: 1.5rem;
        }

        .grid-title {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
            border-left: 5px solid #ff6a3d;
            padding-left: 1rem;
            color: #ffffff;
        }

        .grid-title i {
            color: #ff6a3d;
            margin-right: 8px;
        }

        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .video-card {
            background: #111111;
            border-radius: 1.2rem;
            overflow: hidden;
            transition: all 0.25s ease;
            border: 1px solid #ff6a3d20;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        .card-body {
            padding: 0.9rem 1rem 1rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            line-height: 1.4;
            color: #ffffff;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
        }

        .professional-footer {
            margin-top: 2.5rem;
            background: #0a0a0a;
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            border-top: 1px solid #ff6a3d;
            border-bottom: 1px solid #ff6a3d;
        }

        .copyright {
            font-size: 0.7rem;
            opacity: 0.7;
            color: #cccccc;
        }

        .footer-buttons {
            display: flex;
            gap: 0.8rem;
        }

        .footer-btn {
            background: transparent;
            border: 1px solid #ff6a3d;
            color: #ff8c42;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
        }

        .footer-btn:hover {
            background: #ff6a3d20;
            color: #ffaa66;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-content {
            background: #0a0a0a;
            max-width: 400px;
            width: 100%;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 2px solid #ff6a3d;
            color: #ffffff;
        }

        .modal-content h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #ff8c42;
        }

        .modal-content p {
            line-height: 1.5;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #cccccc;
        }

        .close-modal {
            background: #ff6a3d;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #000000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.8rem;
        }

        .close-modal:hover {
            background: #ff8555;
        }

        button, .btn, .dot, .footer-btn {
            touch-action: manipulation;
        }
        
        .success-check {
            color: #2ecc71;
            margin-left: 5px;
        }

        .highlight {
            color: #ff6a3d;
        }

        .info-text {
            color: #ffaa66;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 10px;
        }

        .info-text i {
            color: #ff6a3d;
        }
    </style>
</head>
<body>

<!-- সরাসরি কন্টেন্ট দেখানো হবে - কোন ভেরিফিকেশন ওভারলে নেই -->
<div id="mainContent" class="main-content">
    <div class="container">
        <div class="slider-section">
            <div class="section-title">
                <i class="fas fa-fire"></i> ট্রেন্ডিং ভিডিও
            </div>
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack"></div>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
            <div class="info-text">
                <i class="fas fa-crown"></i> প্রতিটি বাটন আনলক করতে <strong class="highlight">১টি</strong> এড দেখুন
            </div>
        </div>

        <div class="thumbnails-grid">
            <div class="grid-title"><i class="fas fa-database"></i> আপনার সংগ্রহ</div>
            <div class="grid-container" id="videoGridContainer"></div>
        </div>
    </div>

    <footer class="professional-footer">
        <div class="copyright"><i class="far fa-copyright"></i> ২০২৬ ভিডিও পোর্টাল | <span class="highlight">প্রিমিয়াম কন্টেন্ট</span></div>
        <div class="footer-buttons">
            <button class="footer-btn" id="privacyBtn"><i class="fas fa-shield-alt"></i> প্রাইভেসি</button>
            <button class="footer-btn" id="aboutBtn"><i class="fas fa-info-circle"></i> সম্পর্কে</button>
        </div>
    </footer>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">প্রাইভেসি ও পলিসি</h3>
            <div id="modalBody">
                <p>আমরা আপনার গোপনীয়তাকে সম্মান করি। প্রতিটি বাটন আলাদাভাবে আনলক করতে হবে।</p>
            </div>
            <button class="close-modal">বন্ধ করুন</button>
        </div>
    </div>
</div>

<script>
    // টেলিগ্রাম মিনি অ্যাপ
    let tg = window.Telegram?.WebApp;
    if(tg) {
        tg.expand();
        tg.ready();
        tg.setBackgroundColor("#0a0a0a");
        tg.setHeaderColor("#ff6a3d");
        console.log("টেলিগ্রাম মিনি অ্যাপ রেডি");
    }
    
    // ======================= ৩টি লিংক - রাউন্ড রবিন ট্রাফিক বিতরণ =======================
    const TRAFFIC_LINKS = [
        "https://omg10.com/4/9717825",
        "https://omg10.com/4/9429975",
        "https://omg10.com/4/9446627"
    ];
    
    let linkIndex = 0;
    try {
        const saved = sessionStorage.getItem('traffic_link_index');
        if(saved !== null) {
            linkIndex = parseInt(saved) % TRAFFIC_LINKS.length;
        }
    } catch(e) {}
    
    function getNextTrafficLink() {
        const link = TRAFFIC_LINKS[linkIndex % TRAFFIC_LINKS.length];
        linkIndex++;
        try {
            sessionStorage.setItem('traffic_link_index', linkIndex);
        } catch(e) {}
        return link;
    }
    
    const thumbnailLinks = [
        "https://i.ibb.co.com/k2RM9BDQ/1775025365581.jpg",
        "https://i.ibb.co.com/jP2Ht8Fr/1775025373666.jpg",
        "https://i.ibb.co.com/DfNDddF6/1775025414376.jpg",
        "https://i.ibb.co.com/RTSzsPBR/1775025485987.jpg",
        "https://i.ibb.co.com/99FQCvyr/IMG-20260409-223046.jpg"
    ];
    
    const videoItems = [
        { id:1, title:"🔥 প্রিমিয়াম ভিডিও ১", thumbUrl: thumbnailLinks[0] },
        { id:2, title:"⭐ প্রিমিয়াম ভিডিও ২", thumbUrl: thumbnailLinks[1] },
        { id:3, title:"💎 প্রিমিয়াম ভিডিও ৩", thumbUrl: thumbnailLinks[2] },
        { id:4, title:"🎬 প্রিমিয়াম ভিডিও ৪", thumbUrl: thumbnailLinks[3] },
        { id:5, title:"🎥 প্রিমিয়াম ভিডিও ৫", thumbUrl: thumbnailLinks[4] },
        { id:6, title:"🏆 প্রিমিয়াম ভিডিও ৬", thumbUrl: thumbnailLinks[0] }
    ];
    
    const ADSGRAM_BLOCK_ID = "int-28805";
    let mainAdController = null;
    
    function initAdsgramController(blockId) {
        if (!window.Adsgram) {
            console.error("Adsgram SDK লোড হয়নি!");
            return null;
        }
        
        try {
            const controller = window.Adsgram.init({ 
                blockId: blockId,
                debug: false,
                debugBannerType: "RewardedVideo"
            });
            console.log("AdController তৈরি হয়েছে");
            return controller;
        } catch(e) {
            console.error("Adsgram init error:", e);
            return null;
        }
    }
    
    async function showAd(controller, onSuccess, onError) {
        if (!controller) {
            console.error("AdController নেই!");
            if(onError) onError("AdController not initialized");
            return false;
        }
        
        const loadingNotif = showLoadingNotification("এড লোড হচ্ছে...");
        
        try {
            const result = await controller.show();
            console.log("Ad show result:", result);
            
            hideLoadingNotification(loadingNotif);
            
            if (result && result.done === true) {
                if(onSuccess) onSuccess();
                return true;
            } else {
                showNotification("⚠️ দয়া করে সম্পূর্ণ এড দেখুন! স্কিপ করবেন না।", false);
                if(onError) onError("Ad not completed");
                return false;
            }
        } catch (error) {
            console.error("Ad show error:", error);
            hideLoadingNotification(loadingNotif);
            showNotification("❌ বিজ্ঞাপন লোড করতে সমস্যা হয়েছে! দয়া করে আবার চেষ্টা করুন।", false);
            if(onError) onError(error);
            return false;
        }
    }
    
    function showLoadingNotification(message = "এড লোড হচ্ছে...") {
        const existing = document.querySelector('.loading-notification');
        if(existing) existing.remove();
        
        const div = document.createElement('div');
        div.className = 'loading-notification';
        div.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${message}<br><span style="font-size:0.8rem;">দয়া করে অপেক্ষা করুন</span>`;
        document.body.appendChild(div);
        return div;
    }
    
    function hideLoadingNotification(notification) {
        if(notification && notification.remove) {
            notification.remove();
        } else {
            const existing = document.querySelector('.loading-notification');
            if(existing) existing.remove();
        }
    }
    
    function showNotification(message, isSuccess = true) {
        if(tg) {
            tg.showAlert(message);
        } else {
            alert(message);
        }
    }
    
    // ======================= বাটন আনলক সিস্টেম (১টি এডেই আনলক) =======================
    let buttonStates = new Map();
    
    function getButtonState(videoId, buttonType) {
        const key = `${videoId}_${buttonType}`;
        if(!buttonStates.has(key)) {
            buttonStates.set(key, { current: 0, required: 1, unlocked: false });
        }
        return buttonStates.get(key);
    }
    
    function updateButtonUI(btnElement, state) {
        if(!btnElement) return;
        const counterSpan = btnElement.querySelector('.unlock-counter');
        if(counterSpan) {
            if(state.unlocked) {
                counterSpan.innerHTML = `<i class="fas fa-check-circle success-check"></i> আনলকড`;
            } else {
                counterSpan.innerHTML = `🔓 ${state.current}/${state.required}`;
            }
        }
        
        if(state.unlocked) {
            btnElement.classList.remove('locked');
            btnElement.classList.add('unlocked');
            btnElement.disabled = false;
        } else {
            btnElement.classList.remove('unlocked');
            btnElement.classList.add('locked');
            btnElement.disabled = false;
        }
    }
    
    // ছবি আনলক করার ফাংশন - ব্লার সরিয়ে দেয়
    function unblurImageForVideo(videoId) {
        // সব জায়গায় এই ভিডিওর ছবি খুঁজে ব্লার সরান
        document.querySelectorAll(`.thumb-img[data-video-id="${videoId}"]`).forEach(img => {
            img.classList.remove('blurred');
            img.classList.add('unblurred');
        });
        
        // লক ওভারলেও সরান
        document.querySelectorAll(`.lock-overlay[data-video-id="${videoId}"]`).forEach(overlay => {
            overlay.classList.add('hidden');
        });
    }
    
    function markAsUnlocked(videoId, buttonType, btnElement) {
        const state = getButtonState(videoId, buttonType);
        if(state.unlocked) return true;
        
        state.current = state.required;
        state.unlocked = true;
        updateButtonUI(btnElement, state);
        
        // ছবি আনলক করুন (ব্লার সরান)
        unblurImageForVideo(videoId);
        
        showNotification(`✅ বাটনটি আনলক হয়েছে! এখন সরাসরি ব্যবহার করতে পারবেন।`, true);
        return true;
    }
    
    async function showAdForUnlock(videoId, buttonType, btnElement, onComplete) {
        if (!mainAdController) {
            mainAdController = initAdsgramController(ADSGRAM_BLOCK_ID);
        }
        
        if (!mainAdController) {
            showNotification("❌ বিজ্ঞাপন সিস্টেম প্রস্তুত নয়!", false);
            return false;
        }
        
        const success = await showAd(
            mainAdController,
            () => {
                const unlocked = markAsUnlocked(videoId, buttonType, btnElement);
                if (onComplete) onComplete(unlocked);
            },
            () => {
                if (onComplete) onComplete(false);
            }
        );
        
        return success;
    }
    
    function performAction(videoId, buttonType, btnElement, actionCallback) {
        const state = getButtonState(videoId, buttonType);
        
        if(state.unlocked) {
            actionCallback();
        } else {
            showAdForUnlock(videoId, buttonType, btnElement, (isUnlocked) => {
                if(isUnlocked) {
                    actionCallback();
                }
            });
        }
    }
    
    function handleDownload(videoId, btnElement) {
        performAction(videoId, 'download', btnElement, () => {
            const link = getNextTrafficLink();
            window.open(link, '_blank');
            showNotification("🔗 লিংকে রিডাইরেক্ট করা হচ্ছে...", true);
        });
    }
    
    function handleWatch(videoId, btnElement) {
        performAction(videoId, 'watch', btnElement, () => {
            const link = getNextTrafficLink();
            window.open(link, '_blank');
            showNotification("🔗 লিংকে রিডাইরেক্ট করা হচ্ছে...", true);
        });
    }
    
    function onPlayIconClick(videoId) {
        const state = getButtonState(videoId, 'watch');
        if(state.unlocked) {
            const link = getNextTrafficLink();
            window.open(link, '_blank');
        } else {
            showNotification("⚠️ দয়া করে প্রথমে 'ওয়াচ নাও' বাটনটি আনলক করুন!", false);
        }
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }
    
    function createButtonHTML(item, buttonType, icon, label) {
        const state = getButtonState(item.id, buttonType);
        const btnClass = state.unlocked ? 'unlocked' : 'locked';
        const colorClass = buttonType === 'download' ? 'btn-download' : 'btn-watch';
        
        let counterText = '';
        if(state.unlocked) {
            counterText = `<span class="unlock-counter"><i class="fas fa-check-circle success-check"></i> আনলকড</span>`;
        } else {
            counterText = `<span class="unlock-counter">🔓 ${state.current}/${state.required}</span>`;
        }
        
        return `
            <button class="btn ${colorClass} ${btnClass}" data-video-id="${item.id}" data-btn-type="${buttonType}">
                <i class="fas ${icon}"></i> ${label}
                ${counterText}
            </button>
        `;
    }
    
    function buildCarouselAndGrid() {
        const track = document.getElementById('carouselTrack');
        track.innerHTML = '';
        videoItems.forEach((item) => {
            const state = getButtonState(item.id, 'watch');
            const isUnlocked = state.unlocked;
            const blurClass = isUnlocked ? 'unblurred' : 'blurred';
            const lockHidden = isUnlocked ? 'hidden' : '';
            
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `
                <div class="thumb-video-card">
                    <div class="thumb-wrapper" data-video-id="${item.id}">
                        <img class="thumb-img ${blurClass}" data-video-id="${item.id}" src="${item.thumbUrl}" alt="thumb" onerror="this.src='https://placehold.co/400x225?text=No+Image'">
                        <div class="lock-overlay" data-video-id="${item.id}" style="${lockHidden}">
                            <i class="fas fa-lock"></i>
                        </div>
                        <div class="play-overlay">
                            <i class="fas fa-play-circle"></i>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="video-title">${escapeHtml(item.title)}</div>
                        <div class="button-group">
                            ${createButtonHTML(item, 'download', 'fa-download', 'ডাউনলোড')}
                            ${createButtonHTML(item, 'watch', 'fa-play', 'ওয়াচ নাও')}
                        </div>
                    </div>
                </div>
            `;
            track.appendChild(slide);
        });
        
        const gridContainer = document.getElementById('videoGridContainer');
        gridContainer.innerHTML = '';
        videoItems.forEach((item) => {
            const state = getButtonState(item.id, 'watch');
            const isUnlocked = state.unlocked;
            const blurClass = isUnlocked ? 'unblurred' : 'blurred';
            const lockHidden = isUnlocked ? 'hidden' : '';
            
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumb-wrapper" data-video-id="${item.id}">
                    <img class="thumb-img ${blurClass}" data-video-id="${item.id}" src="${item.thumbUrl}" alt="thumb" onerror="this.src='https://placehold.co/400x225?text=No+Image'">
                    <div class="lock-overlay" data-video-id="${item.id}" style="${lockHidden}">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="play-overlay">
                        <i class="fas fa-play-circle"></i>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-title">${escapeHtml(item.title)}</div>
                    <div class="btn-group">
                        ${createButtonHTML(item, 'download', 'fa-download', 'ডাউনলোড')}
                        ${createButtonHTML(item, 'watch', 'fa-eye', 'ওয়াচ নাও')}
                    </div>
                </div>
            `;
            gridContainer.appendChild(card);
        });
        
        attachEventListeners();
    }
    
    function attachEventListeners() {
        document.querySelectorAll('.btn-download, .btn-watch').forEach(btn => {
            btn.removeEventListener('click', handleBtnClick);
            btn.addEventListener('click', handleBtnClick);
        });
        
        document.querySelectorAll('.thumb-wrapper').forEach(wrapper => {
            const videoId = parseInt(wrapper.getAttribute('data-video-id'));
            wrapper.removeEventListener('click', handlePlayClick);
            wrapper.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                onPlayIconClick(videoId);
            });
        });
    }
    
    function handleBtnClick(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const videoId = parseInt(btn.getAttribute('data-video-id'));
        const btnType = btn.getAttribute('data-btn-type');
        
        if(btnType === 'download') {
            handleDownload(videoId, btn);
        } else if(btnType === 'watch') {
            handleWatch(videoId, btn);
        }
    }
    
    // স্লাইডার
    let currentSlide = 0;
    let autoInterval;
    const totalSlides = videoItems.length;
    
    function buildDotsAndSlider() {
        const dotsDiv = document.getElementById('carouselDots');
        dotsDiv.innerHTML = '';
        for(let i=0; i<totalSlides; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if(i===currentSlide) dot.classList.add('active');
            dot.addEventListener('click', () => {
                goToSlide(i);
                resetAuto();
            });
            dotsDiv.appendChild(dot);
        }
        goToSlide(0);
        startAuto();
    }
    
    function goToSlide(index) {
        if(index<0) index=0;
        if(index>=totalSlides) index=totalSlides-1;
        currentSlide = index;
        const track = document.getElementById('carouselTrack');
        track.style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.dot').forEach((dot,i)=>{
            if(i===currentSlide) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }
    
    function nextSlide() { goToSlide((currentSlide+1)%totalSlides); }
    function startAuto() { if(autoInterval) clearInterval(autoInterval); autoInterval = setInterval(nextSlide, 4000); }
    function resetAuto() { if(autoInterval){clearInterval(autoInterval); startAuto();} }
    
    // মডাল
    const modal = document.getElementById('infoModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBodyDiv = document.getElementById('modalBody');
    
    function showPrivacy() {
        modalTitle.innerText = "📜 গোপনীয়তা ও পলিসি";
        modalBodyDiv.innerHTML = `<p>🔒 প্রতিটি বাটন আনলক করতে <strong class="highlight">১টি</strong> এড দেখতে হবে।</p>
        <p><i class="fas fa-database"></i> কোন ডেটা সঞ্চয় করা হয় না।</p>
        <p>✅ এড শেষ হওয়ার সাথে সাথেই লিংকে নিয়ে যাওয়া হবে।</p>
        <p>🔄 ট্রাফিক ৩টি লিংকে সমানভাবে বিতরণ করা হয়।</p>
        <p>🖼️ আনলক না করা ভিডিওগুলোর ছবি ব্লার করা থাকে।</p>
        <p style="margin-top:10px;"><i class="fas fa-crown highlight"></i> <strong>প্রিমিয়াম কন্টেন্ট</strong></p>`;
        modal.style.display = 'flex';
    }
    
    function showAbout() {
        modalTitle.innerText = "🎬 আমাদের সম্পর্কে";
        modalBodyDiv.innerHTML = `<p><i class="fas fa-tv highlight"></i> <strong>ভিডিও পোর্টাল</strong> - প্রিমিয়াম ভিডিও ডাউনলোড প্ল্যাটফর্ম</p>
        <p>⭐ শুধু <strong class="highlight">১টি এড</strong> দেখেই প্রতিটি বাটন আনলক করুন!</p>
        <p>⚠️ এড সম্পূর্ণ না দেখলে আনলক হবে না!</p>
        <p>🔄 ট্রাফিক ৩টি লিংকে সমানভাবে বিতরণ করা হয়।</p>
        <p>🔓 আনলক করলেই ছবি পরিষ্কার হবে!</p>
        <p style="margin-top:10px;"><i class="fas fa-heart" style="color:#ff6a3d;"></i> আমাদের সাথে থাকার জন্য ধন্যবাদ</p>`;
        modal.style.display = 'flex';
    }
    
    document.getElementById('privacyBtn').addEventListener('click', showPrivacy);
    document.getElementById('aboutBtn').addEventListener('click', showAbout);
    document.querySelector('.close-modal').addEventListener('click', () => {
        modal.style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        if(e.target === modal) modal.style.display = 'none';
    });
    
    function waitForAdsgram() {
        return new Promise((resolve) => {
            if(window.Adsgram) {
                console.log("Adsgram SDK লোড হয়েছে!");
                resolve(true);
                return;
            }
            
            let attempts = 0;
            const interval = setInterval(() => {
                attempts++;
                if(window.Adsgram) {
                    clearInterval(interval);
                    console.log("Adsgram SDK লোড হয়েছে!");
                    resolve(true);
                } else if(attempts > 50) {
                    clearInterval(interval);
                    console.error("Adsgram SDK লোড হয়নি!");
                    resolve(false);
                }
            }, 200);
        });
    }
    
    function init() {
        buildCarouselAndGrid();
        buildDotsAndSlider();
        const caro = document.querySelector('.carousel-container');
        if(caro) {
            caro.addEventListener('mouseenter', () => { if(autoInterval) clearInterval(autoInterval); });
            caro.addEventListener('mouseleave', startAuto);
        }
        
        waitForAdsgram().then((loaded) => {
            if(loaded && window.Adsgram) {
                console.log("✅ এডসগ্রাম প্রস্তুত!");
            } else {
                console.warn("⚠️ এডসগ্রাম লোড হয়নি!");
                showNotification("⚠️ বিজ্ঞাপন সিস্টেম লোড হয়নি! দয়া করে পেজ রিফ্রেশ করুন।", false);
            }
        });
    }
    
    init();
</script>
</body>
</html>
